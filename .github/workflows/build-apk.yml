name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip \
            autoconf automake libtool libtool-bin pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev \
            lld ccache gettext \
            openjdk-17-jdk \
            adb

      - name: Install Buildozer & dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36 virtualenv
          pip install buildozer==1.5.0

      - name: Cache .buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            .buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Build APK
        run: |
          yes | buildozer android debug 2>&1 | tee build.log
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      - name: Show build log tail on failure
        if: failure()
        run: tail -200 build.log

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: apk-debug
          path: bin/*.apk

      - name: Create Release & upload APK
        if: startsWith(github.ref, 'refs/tags/v') && success()
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
          generate_release_notes: true
          body: |
            ## VIP小说爬取 安卓版

            ### 安装方式
            1. 下载下方的 `.apk` 文件到手机
            2. 打开文件管理器，找到 APK 并点击安装
            3. 如提示"未知来源"，请在设置中允许安装

            ### 功能
            - 搜索全网 VIP 小说
            - 在线阅读章节内容
            - 自动保存章节到手机存储
